# La Quesería — production compose stack.
#
#   db      postgres 18-alpine (persistent volume)
#   migrate one-shot `prisma migrate deploy` (runs once, then exits)
#   seed    one-shot idempotent seed (runs after migrate succeeds)
#   web     Next standalone server, gated behind db health + migrations
#
# Required environment (see .env / README): POSTGRES_USER, POSTGRES_PASSWORD,
# POSTGRES_DB, AUTH_SECRET, NEXT_PUBLIC_SITE_URL.

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-env
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      # Postgres 18 expects the mount at /var/lib/postgresql (data lives in a
      # versioned subdir); mounting /var/lib/postgresql/data crash-loops on 18.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp
      - /run
    logging: *default-logging

  migrate:
    build:
      context: .
      target: migrator
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging

  # One-shot seed (idempotent generic data; admin only if ADMIN_* are set).
  #
  # LOCAL: `docker compose up -d --build` runs it automatically (it's a default
  #   service that exits after seeding). Safe: no committed creds, admin is
  #   skipped unless real ADMIN_* are provided, settings are create-only.
  # PRODUCTION: deploy.sh brings up only `db` + `web` (named services), so seed
  #   never runs on a deploy; it is invoked explicitly via deploy.sh --seed /
  #   --bootstrap-admin (which runs `docker compose run --rm seed`).
  seed:
    build:
      context: .
      target: seeder
    environment:
      <<: *app-env
      # Admin bootstrap credentials — never commit real values; supply them via
      # .env / VPS secrets. Empty defaults keep `docker compose up` parseable
      # without these (compose interpolates `:?` at parse time even for inactive
      # profiles). Fail-fast on missing creds is enforced by deploy.sh's
      # --bootstrap-admin path; seed.ts safely skips admin when they are empty.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      FORCE_ADMIN_PASSWORD_RESET: ${FORCE_ADMIN_PASSWORD_RESET:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging

  web:
    build:
      context: .
      target: runner
      args:
        # Build-time placeholder only; the real URL is injected at runtime.
        DATABASE_URL: postgresql://build:build@localhost:5432/build
    restart: unless-stopped
    environment:
      <<: *app-env
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET (min 32 chars)}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging: *default-logging

volumes:
  pgdata:
    driver: local
