<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Tabla de productos artesanales">
  <defs>
    <radialGradient id="bgA" cx="40%" cy="33%" r="85%">
      <stop offset="0%" stop-color="#fbf4e6"/>
      <stop offset="55%" stop-color="#eee0c2"/>
      <stop offset="100%" stop-color="#cdb286"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bgA)"/>
  <g opacity="0.4" fill="#bda06f">
    <circle cx="95" cy="110" r="5"/><circle cx="505" cy="125" r="6"/><circle cx="500" cy="485" r="5"/><circle cx="100" cy="490" r="6"/>
  </g>
  <g transform="translate(300 300)">
    <!-- wooden board -->
    <ellipse cx="0" cy="40" rx="220" ry="150" fill="#9a6a3c" stroke="#6f471f" stroke-width="8"/>
    <ellipse cx="0" cy="40" rx="220" ry="150" fill="none" stroke="#b78a52" stroke-width="3" opacity="0.6"/>
    <!-- cheese wedge -->
    <g transform="translate(-70 8) rotate(-10)">
      <path d="M-70 30 L70 -34 L74 6 L-66 50 Z" fill="#ecc257" stroke="#9a6b2f" stroke-width="5" stroke-linejoin="round"/>
      <path d="M-70 30 L-66 50 L74 6 L70 18 Z" fill="#d8a63e" stroke="#9a6b2f" stroke-width="5" stroke-linejoin="round"/>
      <g fill="#f7e6b0" stroke="#b9863a" stroke-width="2"><ellipse cx="-20" cy="22" rx="9" ry="7"/><ellipse cx="28" cy="2" rx="6" ry="5"/></g>
    </g>
    <!-- grapes -->
    <g transform="translate(78 -6)" fill="#7b566f" stroke="#553a4e" stroke-width="2">
      <circle cx="0" cy="0" r="12"/><circle cx="22" cy="4" r="12"/><circle cx="11" cy="22" r="12"/><circle cx="33" cy="24" r="12"/><circle cx="20" cy="42" r="12"/>
    </g>
    <!-- knife -->
    <g transform="translate(20 96) rotate(-6)">
      <rect x="-150" y="-6" width="200" height="12" rx="6" fill="#d9d2c4" stroke="#9b9382" stroke-width="3"/>
      <rect x="40" y="-9" width="70" height="18" rx="6" fill="#6f471f" stroke="#4c2f13" stroke-width="3"/>
    </g>
  </g>
</svg>
